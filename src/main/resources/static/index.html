<!DOCTYPE html>
<html>
<head>
    <title>URL Shortener</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            text-align: center;
            width: 350px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        h2 {
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ccc;
            margin-bottom: 15px;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #667eea;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #5a67d8;
        }

        #result {
            margin-top: 20px;
            word-break: break-all;
        }

        a {
            color: #667eea;
            font-weight: bold;
        }

        .copy-btn {
            margin-top: 10px;
            background: #48bb78;
        }

    </style>
</head>

<body>

<div class="container">
    <h2>🔗 URL Shortener</h2>

    <input type="text" id="urlInput" placeholder="Paste your long URL">

    <button onclick="shorten()">Shorten URL</button>

    <div id="result"></div>
</div>

<script>
    function shorten() {
        const url = document.getElementById("urlInput").value;

        fetch("http://localhost:8080/shorten", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ url: url })
        })
            .then(res => res.json())
            .then(data => {
                const resultDiv = document.getElementById("result");

                resultDiv.innerHTML = `
            <p>Short URL:</p>
            <a href="${data.shortUrl}" target="_blank">${data.shortUrl}</a>
            <br>
            <button class="copy-btn" onclick="copyText('${data.shortUrl}')">Copy</button>
        `;
            })
            .catch(() => {
                document.getElementById("result").innerText = "Something went wrong";
            });
    }

    function copyText(text) {
        navigator.clipboard.writeText(text);
        alert("Copied!");
    }
</script>

</body>
</html>
