<section id="contact" class="content-section">

        </div>

        <div class="form-group">
            <label>Date</label>
            <input id="date" type="date" class="form-input">
        </div>

        <div class="form-group">
            <label>Signature</label>
            <input id="sign" class="form-input" placeholder="Akshita Sharma">

        <button type="button" class="submit-btn" onclick="generateCertificate()">
            Download Certificate
        </button>

        <p id="certMsg"></p>

    </div>
</section>

<!-- ===== CANVAS ===== -->

<canvas id="certificateCanvas" width="1200" height="800" style="display:none;"></canvas>

<!-- ===== SCRIPT ===== -->

<script>
    function generateCertificate() {

        const name = document.getElementById("name").value.trim();
        const course = document.getElementById("course").value.trim();
        const date = document.getElementById("date").value;
        const sign = document.getElementById("sign").value.trim();
        const msg = document.getElementById("certMsg");

        if (!name || !course || !date || !sign) {
            msg.innerText = "Fill all fields";
            msg.style.color = "red";
            return;
        }

        const canvas = document.getElementById("certificateCanvas");
        const ctx = canvas.getContext("2d");

// CLEAR
        ctx.clearRect(0,0,canvas.width,canvas.height);

// BACKGROUND
        ctx.fillStyle = "#fdfaf6";
        ctx.fillRect(0,0,canvas.width,canvas.height);

// BORDER
        ctx.strokeStyle = "#3e8996";
        ctx.lineWidth = 6;
        ctx.strokeRect(30,30,canvas.width-60,canvas.height-60);

// COMMON STYLE
        ctx.fillStyle = "#3e8996";
        ctx.textAlign = "center";

        let y = 180;

// TITLE
        ctx.font = "bold 42px Georgia";
        ctx.fillText("Certificate of Completion", canvas.width/2, y);

        y += 60;

// SUBTITLE
        ctx.font = "20px Georgia";
        ctx.fillText("is proudly presented to", canvas.width/2, y);

        y += 60;

// NAME
        ctx.font = "bold 44px 'Times New Roman'";
        ctx.fillText(name, canvas.width/2, y);

        y += 15;

// LINE UNDER NAME
        ctx.beginPath();
        ctx.moveTo(350,y);
        ctx.lineTo(850,y);
        ctx.stroke();

        y += 50;

// DESCRIPTION
        ctx.font = "18px Georgia";
        ctx.fillText(
            "By continuing to learn, you have expanded your perspective,",
            canvas.width/2,y
        );

        y += 25;

        ctx.fillText(
            "sharpened your skill, and made yourself even more in demand.",
            canvas.width/2,y
        );

// ===== BOTTOM SECTION =====

        let lineY = 680;

// LEFT LINE (DATE)
        ctx.beginPath();
        ctx.moveTo(200,lineY);
        ctx.lineTo(400,lineY);
        ctx.stroke();

// RIGHT LINE (SIGNATURE)
        ctx.beginPath();
        ctx.moveTo(800,lineY);
        ctx.lineTo(1000,lineY);
        ctx.stroke();

// DATE
        ctx.textAlign = "left";
        ctx.font = "16px Arial";
        ctx.fillText(date,210,lineY+25);

// SIGNATURE
        ctx.textAlign = "right";
        ctx.font = "32px 'Alex Brush',cursive";
        ctx.fillText(sign,990,lineY-10);

// ===== DOWNLOAD =====
        const link = document.createElement("a");
        link.download = "certificate.png";
        link.href = canvas.toDataURL("image/png");

        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);

        msg.innerText = "Certificate downloaded";
        msg.style.color = "green";
    }
</script>
